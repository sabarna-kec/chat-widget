global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "chat-widget-monitor"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:5000"]

  - job_name: "jenkins"
    metrics_path: "/prometheus"
    static_configs:
      - targets: ["43.205.110.133:8080"]
