apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chat-widget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chat-widget-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: WEBSOCKET_PATH
              value: "/ws"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: chat-widget-secrets
                  key: MONGODB_URI
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
