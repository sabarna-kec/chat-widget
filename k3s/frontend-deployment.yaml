apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chat-widget
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: chat-widget-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
              name: http
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VITE_API_URL
            - name: VITE_WEBSOCKET_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VITE_WEBSOCKET_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 5
