services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://localhost:27017/chat-widget}
      PORT: 5000
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - chat-widget-network
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_WEBSOCKET_URL: ws://localhost:5000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - chat-widget-network
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

networks:
  chat-widget-network:
    driver: bridge
